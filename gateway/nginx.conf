# Nginx Gateway Configuration (Port 80/443)
# Reverse proxy with TLS termination, routing, security headers

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 500M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/javascript application/json;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # Upstream service definitions
    upstream frontend {
        server frontend:3000;
    }

    upstream backend_api {
        server backend:5000;
    }

    upstream auth_service {
        server auth_service:5001;
    }

    upstream rag_service {
        server rag_service:5002;
    }

    # HTTP server (dev mode - no TLS redirect)
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ============================================================
        # ROUTING RULES (CRITICAL - DO NOT CHANGE WITHOUT AUTH TESTING)
        # /api/* and /api/auth/* MUST go to frontend (Next.js)
        # Reason: Next.js handles HttpOnly cookie <-> Bearer token
        # NEVER route /api/* directly to backend or auth_service:
        #   - backend does not set cookies → session breaks
        #   - auth_service does not set cookies → login breaks
        # After any change here, run the cookie flow test:
        #   1. POST /api/auth/login  → Set-Cookie must be non-empty
        #   2. GET  /api/auth/me     → must return user info
        # ============================================================

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Health check endpoint
        location /health {
            access_log off;
            proxy_pass http://backend_api/health;
        }

        # Frontend routes
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth API routes - must go through Next.js to handle HttpOnly cookie
        location /api/auth/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Document upload - through Next.js (cookie auth), no buffering for large files
        location /api/documents/upload {
            limit_req zone=upload burst=5 nodelay;
            proxy_pass http://frontend;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # URS generate — long-running AI call, needs extended timeout
        location /api/urs/generate {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 1200s;
            proxy_connect_timeout 15s;
            proxy_send_timeout 1200s;
        }

        # All other API routes - through Next.js for cookie-based auth middleware
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 360s;
            proxy_connect_timeout 15s;
            proxy_send_timeout 360s;
        }

        # Auth service routes (direct - internal/health only)
        location /auth/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # RAG service routes
        location /rag/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://rag_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Deny access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # HTTPS server (production - requires valid certs)
    # Uncomment and set certificate paths when deploying to production
    # server {
    #     listen 443 ssl;
    #     ssl_certificate /etc/nginx/certs/cert.pem;
    #     ssl_certificate_key /etc/nginx/certs/key.pem;
    #     ... same location blocks as above ...
    # }
}
