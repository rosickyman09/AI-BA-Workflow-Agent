services:
  postgres:
    image: postgres:15-alpine
    container_name: ai_ba_postgres
    environment:
      POSTGRES_DB: ai_ba_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_ba_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai-ba-network

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: ai_ba_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo OK'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ai-ba-network

  redis:
    image: redis:7-alpine
    container_name: ai_ba_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-ba-network

  auth_service:
    build:
      context: ../auth_service
      dockerfile: Dockerfile
    container_name: ai_ba_auth_service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ai_ba_db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-60}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\""]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - ai-ba-network
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: ai_ba_backend
    ports:
      - "8000:5000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ai_ba_db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://auth_service:5001
      RAG_SERVICE_URL: http://rag_service:5002
      GOOGLE_DRIVE_CREDENTIALS_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      GOOGLE_SHEETS_ID: ${GOOGLE_SHEETS_ID:-}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-documents_embeddings}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - ai-ba-network
    restart: unless-stopped

  rag_service:
    build:
      context: ../rag_service
      dockerfile: Dockerfile
    container_name: ai_ba_rag_service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ai_ba_db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5002/health')\""]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - ai-ba-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ai_ba_frontend
    environment:
      AUTH_SERVICE_URL: http://auth_service:5001
      BACKEND_SERVICE_URL: http://backend:5000
      RAG_SERVICE_URL: http://rag_service:5002
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ai-ba-network
    restart: unless-stopped

  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: ai_ba_gateway
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      auth_service:
        condition: service_healthy
      rag_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - ai-ba-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local

networks:
  ai-ba-network:
    driver: bridge
